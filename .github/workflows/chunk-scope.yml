name: Chunk Scope Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  chunk-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: Sheraff/bundle/packages/github-action@staging
        env:
          BUNDLE_API_ORIGIN: https://chunk-scope-web-staging.me-b16.workers.dev
        with:
          command: pnpm build
