name: Chunk Scope Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  chunk-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/checkout@v4
        with:
          repository: Sheraff/bundle
          ref: main
          path: .chunk-scope/bundle
      - run: pnpm --dir .chunk-scope/bundle install --frozen-lockfile
      - run: pnpm --dir .chunk-scope/bundle --filter @workspace/github-action exec esbuild ../vite-plugin/src/index.ts --bundle --format=esm --platform=node --external:vite --outfile="$PWD/.chunk-scope/vite-plugin.mjs"
      - uses: Sheraff/bundle/packages/github-action@main
        env:
          BUNDLE_API_ORIGIN: https://chunk-scope-web-staging.me-b16.workers.dev
        with:
          command: pnpm build
